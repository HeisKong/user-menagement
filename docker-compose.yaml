version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-dev-2
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user-management
    ports:
      - "5433:5432"   # 🔥 เปลี่ยน port กันชน

  app:
    build: .
    container_name: user-menagement-app-1
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/user-management
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin